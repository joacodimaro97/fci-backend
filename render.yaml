# Blueprint opcional. Si ya creaste el Postgres a mano, podés ignorar este archivo
# y configurar el Web Service desde el dashboard (ver README).
services:
  - type: web
    name: fci-backend
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_SECRET
        generateValue: true
      # Linkeá tu Postgres existente en el dashboard, o descomenta si usás Blueprint:
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: fci-backend-db
      #     property: connectionString
